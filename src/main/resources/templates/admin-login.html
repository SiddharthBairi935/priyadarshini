<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login - Priyadarshini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #170A1C; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .login-card { background: rgba(35, 15, 40, 0.8); padding: 40px; border-radius: 15px; border: 1px solid #E83E8C; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        .btn-custom { background: #E83E8C; color: white; width: 100%; font-weight: bold; border: none; padding: 10px; border-radius: 8px; margin-top: 20px; }
        .btn-custom:hover { background: #6F42C1; color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4" style="color: #D4AF37;">Admin Portal Access</h3>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required style="background: rgba(0,0,0,0.5); color: white; border: 1px solid #6F42C1;">
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required style="background: rgba(0,0,0,0.5); color: white; border: 1px solid #6F42C1;">
            </div>
            <button type="submit" class="btn btn-custom">Login Securely</button>
        </form>
    </div>
</body>
</html>
