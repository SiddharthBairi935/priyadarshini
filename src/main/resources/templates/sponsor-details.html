<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sponsor Details - Priyadarshini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #170A1C; color: #fff; padding: 40px 0; }
        .glass-card { background: rgba(35, 15, 40, 0.8); border: 1px solid rgba(232, 62, 140, 0.2); border-radius: 16px; padding: 40px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .info-label { color: #a0aec0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .info-value { font-size: 1.2rem; color: #fff; font-weight: 600; margin-bottom: 25px; }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/sponsors}" class="btn btn-outline-light mb-4 rounded-pill px-4"><i class="fa-solid fa-arrow-left"></i> Back to All Sponsors</a>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card text-center">
                
                <div style="background: white; display: inline-block; padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                    <img th:if="${sponsor.logoBase64 != null}" th:src="${sponsor.logoBase64}" style="max-height: 150px; max-width: 100%;">
                </div>
                
                <h1 style="color: #D4AF37; font-weight: 600; margin-bottom: 5px;" th:text="${sponsor.businessName}"></h1>
                <span style="background: rgba(232, 62, 140, 0.2); color: #E83E8C; padding: 5px 15px; border-radius: 20px; font-weight: 600; display: inline-block; margin-bottom: 40px;" th:text="${sponsor.sponsorshipType}"></span>

                <div class="row text-start">
                    <div class="col-md-6">
                        <div class="info-label"><i class="fa-solid fa-briefcase"></i> Industry</div>
                        <div class="info-value" th:text="${sponsor.businessType}"></div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-label"><i class="fa-solid fa-envelope"></i> Official Contact</div>
                        <div class="info-value">
                            <a th:href="'mailto:' + ${sponsor.email}" style="color: #fff; text-decoration: none;" th:text="${sponsor.email}"></a>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</div>
</body>
</html>
