<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Staff Check-in Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #170A1C; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .login-card { background: rgba(35, 15, 40, 0.8); border: 1px solid rgba(232, 62, 140, 0.3); border-radius: 16px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        .form-control { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .form-control:focus { background: rgba(0,0,0,0.5); border-color: #E83E8C; color: white; box-shadow: none; }
        .btn-glow { background: linear-gradient(45deg, #E83E8C, #D4AF37); border: none; color: white; font-weight: 600; padding: 10px; border-radius: 8px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #D4AF37; margin-bottom: 5px;"><i class="fa-solid fa-clipboard-user"></i> Staff Portal</h2>
        <p style="color: #a0aec0; margin-bottom: 30px;">Event Day Check-in Access</p>
        
        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
        
        <form th:action="@{/staff/login}" method="post">
            <input type="text" name="username" class="form-control mb-3" placeholder="Staff Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn-glow">Secure Login</button>
        </form>
    </div>
</body>
</html>
