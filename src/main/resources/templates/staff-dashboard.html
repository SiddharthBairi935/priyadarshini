<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Day Check-in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-glow: #E83E8C; --accent-gold: #D4AF37; --bg-color: #170A1C; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; padding: 30px; }
        .glass-panel { background: rgba(35, 15, 40, 0.8); border: 1px solid rgba(232, 62, 140, 0.2); border-radius: 12px; overflow: hidden; }
        .control-input { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(232, 62, 140, 0.4) !important; color: white !important; }
        .control-input:focus { border-color: var(--primary-glow) !important; }
        table { width: 100%; color: white; margin-bottom: 0 !important; }
        th { background-color: rgba(111, 66, 193, 0.9) !important; color: white !important; padding: 18px 15px !important; text-transform: uppercase; font-size: 0.85rem; border: none !important; }
        td { padding: 16px 15px !important; border-bottom: 1px solid rgba(232, 62, 140, 0.15) !important; vertical-align: middle; background: transparent !important; color: white !important; }
        tr:hover td { background-color: rgba(232, 62, 140, 0.1) !important; }
    </style>
</head>
<body>

    <div class="container-fluid">
        
        <div class="d-flex justify-content-between align-items-center mb-4" style="border-bottom: 2px solid var(--primary-glow); padding-bottom: 15px;">
            <h2 style="color: #D4AF37; margin: 0;"><i class="fa-solid fa-qrcode"></i> Fast Check-in Desk</h2>
            <a th:href="@{/staff/logout}" class="btn btn-outline-danger"><i class="fa-solid fa-right-from-bracket"></i> Staff Logout</a>
        </div>

        <div class="glass-panel p-3 mb-4 d-flex gap-3 align-items-center shadow-lg">
            <div class="input-group" style="max-width: 600px;">
                <span class="input-group-text control-input"><i class="fa-solid fa-magnifying-glass" style="color: #E83E8C;"></i></span>
                <input type="text" id="fastSearch" class="form-control control-input" placeholder="Search by Reg ID, Name, or Contact to check-in..." autofocus>
            </div>
            <button id="resetSearch" class="btn btn-outline-secondary text-white border-secondary"><i class="fa-solid fa-rotate-right"></i> Clear</button>
        </div>

        <div class="table-responsive glass-panel shadow-lg">
            <table class="table table-borderless table-hover align-middle mb-0" id="checkinTable">
                <thead>
                    <tr>
                        <th>Reg ID</th>
                        <th>Attendee Name</th>
                        <th>Contact</th>
                        <th>Category</th>
                        <th class="text-center">Event Day Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="person : ${registrations}">
                        <td style="font-family: monospace; color: var(--accent-gold); font-weight: bold;" th:text="${person.uniqueId != null ? person.uniqueId : 'PRIYA-' + person.id}"></td>
                        <td th:text="${person.name}" style="font-weight: 600; color: #E83E8C;"></td>
                        <td th:text="${person.phoneNumber}" style="color: #a0aec0;"></td>
                        <td th:text="${person.gender}"></td>
                        
                        <td class="text-center">
                            <a th:if="${!person.present}" 
                               th:href="@{/staff/mark-present/{id}(id=${person.id})}" 
                               class="btn btn-outline-light btn-sm" style="border-radius: 20px; font-weight: 600; padding: 6px 15px;">
                                <i class="fa-solid fa-check"></i> Mark Present
                            </a>
                            
                            <span th:if="${person.present}" 
                                  style="background: #28a745; color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: inline-block;">
                                <i class="fa-solid fa-lock"></i> Checked In
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>

    <script>
        // FAST SEARCH LOGIC
        const searchInput = document.getElementById('fastSearch');
        const tableRows = document.querySelectorAll('#checkinTable tbody tr');

        function filterTable() {
            const searchTerm = searchInput.value.toLowerCase();
            tableRows.forEach(row => {
                const id = row.cells[0].textContent.toLowerCase();
                const name = row.cells[1].textContent.toLowerCase();
                const contact = row.cells[2].textContent.toLowerCase();
                
                if (id.includes(searchTerm) || name.includes(searchTerm) || contact.includes(searchTerm)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('keyup', filterTable);
        
        document.getElementById('resetSearch').addEventListener('click', () => {
            searchInput.value = '';
            filterTable();
            searchInput.focus();
        });
    </script>
</body>
</html>
