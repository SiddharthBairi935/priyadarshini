<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Our Sponsors - Priyadarshini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #170A1C; color: #fff; padding: 40px 0; }
        .sponsor-card { background: rgba(35, 15, 40, 0.8); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 20px; text-align: center; transition: all 0.3s ease; text-decoration: none; display: block; height: 100%; cursor: pointer;}
        .sponsor-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2); border-color: #D4AF37; }
        .tier-badge { background: rgba(212, 175, 55, 0.2); color: #D4AF37; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-5">
        <h1 style="color: #D4AF37; font-weight: 600;">Our Esteemed Sponsors</h1>
        <p style="color: #a0aec0;">We are deeply grateful to the corporate partners empowering women in business.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4 col-sm-6" th:each="sponsor : ${sponsors}">
            <a th:href="@{/sponsors/{id}(id=${sponsor.id})}" class="sponsor-card">
                <div class="tier-badge" th:text="${sponsor.sponsorshipType}"></div>
                
                <div style="height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                    <img th:if="${sponsor.logoBase64 != null}" th:src="${sponsor.logoBase64}" style="max-height: 100px; max-width: 100%; object-fit: contain; border-radius: 8px;">
                    <span th:unless="${sponsor.logoBase64 != null}" style="color: #666;">No Logo</span>
                </div>
                
                <h4 style="color: #E83E8C; margin: 0;" th:text="${sponsor.businessName}"></h4>
                <small style="color: #a0aec0;" th:text="${sponsor.businessType}"></small>
            </a>
        </div>
    </div>
    
    <div class="text-center mt-5">
        <a th:href="@{/register}" class="btn btn-outline-light rounded-pill px-4">Return to Main Website</a>
    </div>
</div>
</body>
</html>
