<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Event Registrations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #170A1C; color: white; font-family: sans-serif; padding: 30px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #E83E8C; padding-bottom: 15px; margin-bottom: 30px; }
        .table-glass { background: rgba(35, 15, 40, 0.8); backdrop-filter: blur(10px); border-radius: 15px; overflow: hidden; }
        table { width: 100%; color: white; margin-bottom: 0 !important; }
        th { background-color: #6F42C1 !important; color: white !important; padding: 15px !important; }
        td { padding: 15px !important; border-bottom: 1px solid rgba(232, 62, 140, 0.2); vertical-align: middle; }
        tr:hover td { background-color: rgba(232, 62, 140, 0.1); }
        .badge-free { background-color: #28a745; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .badge-paid { background-color: #D4AF37; color: black; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <h2 style="color: #D4AF37;">Registered Attendees Database</h2>
			<a th:href="@{/admin/sponsors}" class="btn btn-outline-warning me-2"><i class="fa-solid fa-crown"></i> View Sponsors</a>
			<a th:href="@{/admin/logout}" class="btn btn-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>

        <div class="table-responsive table-glass shadow-lg">
			<table class="table table-borderless table-hover align-middle">
			                <thead>
			                    <tr style="border-bottom: 2px solid var(--glass-border);">
			                        <th>ID</th>
			                        <th>Name & Contact</th>
			                        <th>Category</th>
			                        <th>Fee Status</th>
			                        <th class="text-center">Event Day</th> 
			                    </tr>
			                </thead>
			                <tbody>
			                    <tr th:each="person : ${registrations}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
			                        <td style="font-family: monospace; color: var(--accent-gold);" th:text="${person.uniqueId != null ? person.uniqueId : 'PRIYA-' + person.id}"></td>
			                        
			                        <td>
			                            <a th:href="@{/admin/details/{id}(id=${person.id})}" style="text-decoration: none;">
			                                <strong th:text="${person.name}" style="color: #E83E8C; font-size: 1.1rem; transition: color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#E83E8C'"></strong>
			                            </a><br>
			                            <small th:text="${person.phoneNumber}" style="color: #a0aec0;"></small>
			                        </td>
			                        
			                        <td th:text="${person.gender}"></td>
			                        
			                        <td>
			                            <span th:if="${person.registrationFee == 0}" style="background: rgba(40, 167, 69, 0.2); color: #28a745; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">Free</span>
			                            <span th:if="${person.registrationFee > 0}" style="background: rgba(212, 175, 55, 0.2); color: #D4AF37; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">Paid ₹2000</span>
			                        </td>
			                        
			                        <td class="text-center">
			                            <a th:href="@{/admin/toggle-presence/{id}(id=${person.id})}" 
			                               th:style="${person.present} ? 'background: #28a745; color: white; border: none;' : 'background: rgba(255,255,255,0.1); color: #a0aec0; border: 1px solid rgba(255,255,255,0.2);'"
			                               class="btn btn-sm" style="border-radius: 20px; padding: 6px 15px; font-weight: 600; transition: all 0.3s ease;">
			                               <i class="fa-solid" th:classappend="${person.present} ? 'fa-check-circle' : 'fa-clock'"></i>
			                               <span th:text="${person.present} ? ' Present' : ' Mark Present'"></span>
			                            </a>
			                        </td>
			                    </tr>
			                </tbody>
			            </table>
        </div>
    </div>

</body>
</html>
