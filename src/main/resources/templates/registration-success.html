<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - Priyadarshini</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-glow: #E83E8C;     
            --secondary-glow: #6F42C1;   
            --accent-gold: #D4AF37;      
            --bg-color: #170A1C;         
            --glass-bg: rgba(35, 15, 40, 0.65); 
            --glass-border: rgba(232, 62, 140, 0.2); 
            --text-main: #ffffff;
            --text-muted: #F8BBD0;       
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 12s infinite ease-in-out alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary-glow); top: -100px; left: -100px; opacity: 0.5; }
        .orb-2 { width: 500px; height: 500px; background: var(--secondary-glow); bottom: -150px; right: -100px; animation-delay: -6s; opacity: 0.5; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(40px) scale(1.1); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 4rem 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            font-size: 5rem;
            color: #28a745;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(40, 167, 69, 0.5);
        }

        .header-title {
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--accent-gold), var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        
        .header-subtitle { 
            color: var(--text-muted); 
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px; 
            font-weight: 400; 
        }

        .btn-glow {
            background: transparent;
            border: 2px solid var(--primary-glow);
            color: #fff;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-glow:hover {
            background: var(--primary-glow);
            box-shadow: 0 10px 20px rgba(232, 62, 140, 0.4);
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="glass-card">

    <div class="text-center mb-4">
        <img th:src="@{/images/logo.png}" alt="Priyadarshini Logo" 
             style="max-width: 100%; height: auto; max-height: 80px; border-radius: 12px; box-shadow: 0 5px 25px rgba(232, 62, 140, 0.3);">
    </div>
    
    <i class="fa-solid fa-circle-check success-icon"></i>
    <h1 class="header-title">Thank you for Registering!</h1>
    <p class="header-subtitle">
        We have successfully received your details. We will verify your information and send you a confirmation mail on your registered email address shortly.
    </p>
    <a th:href="@{/register}" class="btn-glow"><i class="fa-solid fa-arrow-left me-2"></i> Return to Home</a>
    
</div>

</body>
</html>
