<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Event Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Beautiful modern gradient background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .registration-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .form-title {
            color: #333;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }
        .section-header {
            color: #764ba2;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 8px;
            margin-top: 25px;
            margin-bottom: 20px;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .form-label {
            font-weight: 500;
            color: #555;
            font-size: 0.95rem;
        }
        /* Dynamic Payment Section with Animation */
        #paymentSection {
            display: none;
            background: #f8f9fc;
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
            animation: slideDown 0.4s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .qr-placeholder {
            width: 160px;
            height: 160px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 14px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="registration-card">
                
                <h2 class="form-title">Exclusive Event Registration</h2>
                
                <form th:action="@{/register}" th:object="${registration}" method="post">
                    
                    <h4 class="section-header">1. Personal Information</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="John Doe" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" th:field="*{emailAddress}" placeholder="john@example.com" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="number" class="form-control" th:field="*{phoneNumber}" placeholder="1234567890" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Latest Education (Background)</label>
                            <input type="text" class="form-control" th:field="*{background}" placeholder="e.g., Bachelor of Science" required />
                        </div>
                    </div>

                    <h4 class="section-header">2. Business Profile</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Business Name</label>
                            <input type="text" class="form-control" th:field="*{businessName}" placeholder="Acme Corp" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Business Type</label>
                            <input type="text" class="form-control" th:field="*{businessType}" placeholder="e.g., Retail, Tech" />
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Business Location</label>
                            <input type="text" class="form-control" th:field="*{businessLocation}" placeholder="City, State" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Business Email</label>
                            <input type="email" class="form-control" th:field="*{businessEmail}" placeholder="contact@acmecorp.com" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Business Phone Number</label>
                            <input type="number" class="form-control" th:field="*{businessPhoneNumber}" placeholder="0987654321" />
                        </div>
                    </div>

                    <h4 class="section-header">3. Registration Type</h4>
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Select Gender</label>
                            <select class="form-select" th:field="*{gender}" id="genderSelect" onchange="handleDynamicForm()" required>
                                <option value="" selected disabled>-- Choose Gender --</option>
                                <option value="Female">Female (Free Registration)</option>
                                <option value="Male">Male (Standard Registration)</option>
                            </select>
                        </div>
                    </div>

                    <div id="paymentSection">
                        <h5 class="text-center mb-3" style="color: #333;">Complete Your Payment</h5>
                        <p class="text-center text-muted mb-4">Please scan the QR code below to pay the registration fee.</p>
                        
                        <div class="qr-placeholder">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=YourPaymentLinkHere" alt="Scan to Pay" style="border-radius: 8px;">
                        </div>
                        
                        <div class="row justify-content-center mt-3">
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Enter Transaction ID <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{transactionId}" id="transactionIdInput" placeholder="e.g., TXN123456789" />
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit" id="submitButton">Complete Registration</button>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    function handleDynamicForm() {
        const gender = document.getElementById("genderSelect").value;
        const paymentSection = document.getElementById("paymentSection");
        const submitButton = document.getElementById("submitButton");
        const transactionInput = document.getElementById("transactionIdInput");

        if (gender === "Female") {
            // Smoothly hide payment, remove required attribute, update button
            paymentSection.style.display = "none";
            transactionInput.required = false;
            transactionInput.value = ""; // Clear any entered ID
            submitButton.innerText = "Register for Free ✨";
        } else if (gender === "Male") {
            // Show payment section, make transaction ID mandatory, update button
            paymentSection.style.display = "block";
            transactionInput.required = true;
            submitButton.innerText = "Confirm Payment & Submit 💳";
        } else {
            // Default reset state
            paymentSection.style.display = "none";
            transactionInput.required = false;
            submitButton.innerText = "Complete Registration";
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
